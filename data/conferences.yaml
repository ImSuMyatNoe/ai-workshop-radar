# Top-tier AI conferences with multi-stage deadlines.
# Schema:
#   id: lowercase shortname + year, e.g. neurips2026
#   name: short name (NeurIPS, ICML, ACL, ...)
#   full_name: full conference name
#   year: int
#   url: official website
#   location: city, country
#   start_date / end_date: YYYY-MM-DD
#   topics: list of topic IDs from topics.yaml
#   tier: A* | A | B (community-perceived tier; for filtering)
#   deadlines: list of {stage, deadline, timezone, note}
#     stage: abstract | paper | supplementary | rebuttal | notification |
#            camera_ready | travel_grant | registration | poster | workshops_deadline
#     timezone: IANA tz (e.g. "Asia/Tokyo") or "AoE" (Anywhere on Earth = UTC-12)

conferences:

  # =========== AI / ML general ===========
  - id: neurips2026
    name: NeurIPS
    full_name: Conference on Neural Information Processing Systems
    year: 2026
    url: https://neurips.cc/Conferences/2026
    location: San Diego, USA
    start_date: 2026-12-01
    end_date: 2026-12-07
    tier: A*
    description: >
      The premier ML conference covering deep learning, optimization, generative models,
      neuroscience-inspired AI, RL, fairness, theory, and applications. Both empirical
      and theoretical work; broad scope makes it the default top-tier venue for ML.
    h_index: 372
    acceptance_rate: "26.1%"
    ranking: CORE A*, CCF-A
    submission_url: https://openreview.net/group?id=NeurIPS.cc/2026/Conference
    format_notes: >
      9 pages excluding refs/appendix; LaTeX template required; double-blind; unlimited
      supplementary; checklist mandatory. OpenReview submission.
    topics: [ml_general, ai_safety, multimodal, nlp, cv, rl, agents, interpretability, evaluation]
    deadlines:
